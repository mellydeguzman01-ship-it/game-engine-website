<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="Game Engine game profile with gameplay overview, demo preview, features, and how to play details."
    >
    <title>Game Detail | Game Engine</title>
    <link rel="preload" as="image" href="assets/ge-logo.png">
    <link rel="stylesheet" href="styles.css">
    <script src="game-detail.js" defer></script>
    <script src="script.js" defer></script>
  </head>
  <body class="game-detail-page">
    <header class="detail-topbar">
      <a class="detail-topbar-link" href="index.html#innovation-games">Back to Games</a>
      <a class="brand" href="index.html#home" aria-label="Game Engine homepage">
        <img src="assets/ge-logo.png" alt="Game Engine" width="291" height="86">
      </a>
    </header>

    <main id="detail-main">
      <section class="game-detail-shell" data-game-detail hidden>
        <section class="detail-hero-grid" aria-label="Game introduction">
          <div class="detail-intro-card">
            <img class="detail-game-logo" data-game-logo src="" alt="">
            <div class="detail-game-copy">
              <p class="detail-kicker" data-game-category></p>
              <h1 data-game-title></h1>
              <p data-game-tagline></p>
            </div>
            <a class="button button-primary detail-play-button" data-play-game href="https://pilot.gelotto-test.com/" target="_blank" rel="noopener noreferrer">PLAY GAME</a>
          </div>

          <section class="detail-demo-card" aria-label="Demo video">
            <div class="detail-demo-screen" aria-label="Demo video preview">
              <div class="detail-demo-poster">
                <span>MEGA WIN!</span>
                <strong data-demo-prize></strong>
                <small data-demo-caption></small>
              </div>
            </div>
          </section>
        </section>

        <section class="detail-stats-grid" data-stats aria-label="Game statistics"></section>

        <section class="detail-info-panel" data-detail-info aria-label="Game profile details">
          <article class="detail-info-card detail-overview-card" id="game-overview">
            <div class="detail-card-art detail-card-art-overview" role="img" aria-label="Game Overview"></div>
            <div data-overview></div>
          </article>

          <article class="detail-info-card detail-features-card" id="game-features" data-features-card>
            <div class="detail-card-art detail-card-art-features" role="img" aria-label="Features"></div>
            <div data-features></div>
          </article>

          <article class="detail-info-card detail-how-card" id="how-to-play">
            <div class="detail-card-art detail-card-art-how" role="img" aria-label="How to Play"></div>
            <ol data-how-to-play></ol>
          </article>
        </section>
      </section>

      <section class="game-detail-shell detail-missing" data-game-missing hidden>
        <div class="detail-missing-card">
          <h1>Game profile unavailable</h1>
          <p>The requested game profile could not be found. Please return to the games section and choose another title.</p>
          <a class="button button-primary" href="index.html#innovation-games">View Games</a>
        </div>
      </section>
    </main>

    <div class="floating-actions" aria-label="Quick actions">
      <div class="chat-widget" data-chat-widget data-telegram-api-base="" data-telegram-endpoint="/api/telegram/messages" data-telegram-events-endpoint="/api/telegram/events">
        <section class="chat-window" data-chat-window aria-labelledby="chat-title" hidden>
          <header class="chat-header">
            <div>
              <p class="eyebrow">Chat Inquiry</p>
              <h2 id="chat-title">Game Engine Team</h2>
            </div>
            <button type="button" class="chat-icon-button" data-chat-minimize aria-label="Minimize chat">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M5 12h14"></path>
              </svg>
            </button>
          </header>
          <div class="chat-messages" data-chat-messages aria-live="polite"></div>
          <p class="chat-status" data-chat-status role="status" aria-live="polite"></p>
          <form class="chat-form" data-chat-form>
            <input type="text" name="message" data-chat-input autocomplete="off" placeholder="Type your message" aria-label="Type your message" required>
            <button type="submit" data-chat-submit aria-label="Send message">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4 11.5l16-7-5.8 15-3.2-6.2L4 11.5z"></path>
                <path d="M11 13.3l4.7-4.7"></path>
              </svg>
            </button>
          </form>
        </section>
        <button class="floating-action chat-toggle" type="button" data-chat-toggle aria-expanded="false" aria-label="Open chat inquiry">
          <span class="chat-toggle-icon" aria-hidden="true"></span>
        </button>
      </div>
    </div>
  </body>
</html>
