<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="Game Engine news article with full update details, feature information, screenshots, and platform links."
    >
    <title>News Detail | Game Engine</title>
    <link rel="preload" as="image" href="assets/ge-logo.png">
    <link rel="stylesheet" href="styles.css?v=20260716-ui8">
    <script src="news-detail.js?v=20260716-ui8" defer></script>
    <script src="script.js?v=20260716-ui8" defer></script>
  </head>
  <body class="game-detail-page news-detail-page">
    <header class="detail-topbar">
      <a class="detail-topbar-link" href="index.html#news">Back to News</a>
      <a class="brand" href="index.html#home" aria-label="Game Engine homepage">
        <img src="assets/ge-logo.png" alt="Game Engine" width="291" height="86">
      </a>
    </header>

    <main id="news-main">
      <section class="news-detail-shell" data-news-detail hidden>
        <article class="news-detail-article">
          <div class="news-detail-media" data-news-media></div>

          <div class="news-detail-content">
            <div class="news-detail-meta">
              <span data-news-category></span>
              <time data-news-date></time>
            </div>
            <h1 data-news-title></h1>

            <div class="news-detail-copy" data-news-copy></div>

            <section class="news-detail-section" data-news-features-section hidden>
              <h2 data-news-features-title></h2>
              <div class="news-feature-grid" data-news-features></div>
            </section>

            <section class="news-detail-section" data-news-links-section hidden>
              <h2>Platform Links</h2>
              <div class="news-platform-links" data-news-links></div>
            </section>
          </div>
        </article>
      </section>

      <section class="game-detail-shell detail-missing" data-news-missing hidden>
        <div class="detail-missing-card">
          <h1>News article unavailable</h1>
          <p>The requested news article could not be found. Please return to the news section and choose another update.</p>
          <a class="button button-primary" href="index.html#news">View News</a>
        </div>
      </section>
    </main>

    <div class="floating-actions" aria-label="Quick actions">
      <div class="chat-widget" data-chat-widget data-telegram-api-base="https://telegram-chat-widget-t1m3.onrender.com" data-telegram-endpoint="/api/telegram/messages" data-telegram-events-endpoint="/api/telegram/events">
        <section class="chat-window" data-chat-window aria-labelledby="chat-title" hidden>
          <header class="chat-header">
            <div>
              <p class="eyebrow">Chat Inquiry</p>
              <h2 id="chat-title">Game Engine Team</h2>
            </div>
            <button type="button" class="chat-icon-button" data-chat-minimize aria-label="Minimize chat">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M5 12h14"></path>
              </svg>
            </button>
          </header>
          <div class="chat-messages" data-chat-messages aria-live="polite"></div>
          <p class="chat-status" data-chat-status role="status" aria-live="polite"></p>
          <p class="chat-character-counter" data-chat-counter>0 / 3,000 characters</p>
          <form class="chat-form" data-chat-form>
            <input type="text" name="message" data-chat-input autocomplete="off" placeholder="Type your message" aria-label="Type your message" maxlength="3000" required>
            <button type="submit" data-chat-submit aria-label="Send message">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4 11.5l16-7-5.8 15-3.2-6.2L4 11.5z"></path>
                <path d="M11 13.3l4.7-4.7"></path>
              </svg>
            </button>
          </form>
        </section>
        <button class="floating-action chat-toggle" type="button" data-chat-toggle aria-expanded="false" aria-label="Open chat inquiry">
          <span class="chat-toggle-icon" aria-hidden="true"></span>
        </button>
      </div>
    </div>
  </body>
</html>
